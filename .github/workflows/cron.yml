name: AI Agent Analysis
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install repo deps (npm if package.json exists)
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi
          if [[ -f requirements.txt ]]; then
            python3 -m pip install --quiet -r requirements.txt
          fi

      - name: Restore Claude credentials (subscription OAuth)
        env:
          CREDS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.claude"
          printf '%s' "$CREDS" > "$HOME/.claude/.credentials.json"
          chmod 600 "$HOME/.claude/.credentials.json"
          jq -e '.claudeAiOauth.accessToken' "$HOME/.claude/.credentials.json" >/dev/null \
            || (echo "credentials file shape unexpected" >&2; exit 1)

      - name: Restore deploy SSH key + alias 'investory'
        env:
          KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$KEY" > "$HOME/.ssh/id_deploy"
          chmod 600 "$HOME/.ssh/id_deploy"
          # The cron script uses 'ssh investory' / 'rsync ... investory:...'
          # Set up the same alias here so the script is unmodified.
          cat > "$HOME/.ssh/config" <<EOF
          Host investory
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 "$HOME/.ssh/config"
          ssh-keyscan -H "$HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      # Replacement for apiecebot's notify-telegram.sh.
      # Reads TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID from env (injected from
      # GH Secrets at the run step). curl is silent (-s -o /dev/null) so the
      # token (which is in the URL path) never appears in logs.
      - name: Install Telegram notifier
        run: |
          mkdir -p "$HOME/bin"
          cat > "$HOME/bin/notify-telegram.sh" <<'EOF'
          #!/usr/bin/env bash
          set -uo pipefail
          MSG="${1:-}"
          [[ -z "$MSG" ]] && exit 0
          if [[ -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
            echo "[notify-telegram] missing env vars — skipping" >&2
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "parse_mode=Markdown" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            || echo "000")
          if [[ "$HTTP" =~ ^2 ]]; then
            echo "[notify-telegram] OK ($HTTP)"
          else
            echo "[notify-telegram] failed: HTTP $HTTP" >&2
          fi
          exit 0
          EOF
          chmod +x "$HOME/bin/notify-telegram.sh"

      # The cron script does `export HOME="/home/openclaw"` at the top, so all
      # path references like "$HOME/investory/logs" resolve to
      # /home/openclaw/investory/logs — which doesn't exist on a GH runner.
      # Provision /home/openclaw as a symlink farm pointing at runner-owned dirs.
      - name: Provision /home/openclaw layout
        run: |
          set -euo pipefail
          sudo mkdir -p /home/openclaw
          sudo ln -sfn "$GITHUB_WORKSPACE" /home/openclaw/investory
          sudo mkdir -p /home/openclaw/bin /home/openclaw/.npm-global
          sudo cp "$HOME/bin/notify-telegram.sh" /home/openclaw/bin/
          # Also point Claude Code's expected $HOME/.claude at the runner's copy
          sudo ln -sfn "$HOME/.claude" /home/openclaw/.claude
          sudo ln -sfn "$HOME/.ssh"    /home/openclaw/.ssh
          sudo chown -R runner:runner /home/openclaw
          ls -la /home/openclaw

      # The cron script does `export PATH="$HOME/.bun/bin:$HOME/.npm-global/bin:..."`,
      # so the agent CLI must live at /home/openclaw/.npm-global/bin/. Cache the
      # whole install dir keyed by the latest version on npm, so we only re-download
      # when a new version is published.
      - name: Resolve agent CLI version
        id: agent-ver
        run: echo "v=$(npm view @anthropic-ai/claude-code version)" >> "$GITHUB_OUTPUT"

      - name: Cache agent CLI install
        id: agent-cache
        uses: actions/cache@v4
        with:
          path: /home/openclaw/.npm-global
          key: agent-cli-${{ runner.os }}-${{ steps.agent-ver.outputs.v }}

      - name: Install agent CLI (cache miss)
        if: steps.agent-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          npm install -g --prefix /home/openclaw/.npm-global \
            "@anthropic-ai/claude-code@${{ steps.agent-ver.outputs.v }}"

      - name: Verify agent CLI
        run: /home/openclaw/.npm-global/bin/claude --version

      - name: Runner resources
        run: |
          echo "--- memory ---"; free -h
          echo "--- disk ---";   df -h /
          echo "--- cpu ---";    nproc

      - name: Run cron job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash ./scripts/cron-publish.sh

      # Refresh-token rotation: persist updated credentials back into the
      # secret so the NEXT run can authenticate. Uses the GH_PAT (fine-grained
      # PAT with 'Secrets: read/write' scope on this repo).
      - name: Save refreshed credentials
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          if [[ -f "$HOME/.claude/.credentials.json" ]]; then
            gh secret set CLAUDE_CREDENTIALS \
              --repo "${{ github.repository }}" \
              < "$HOME/.claude/.credentials.json"
            echo "credentials secret updated"
          else
            echo "no credentials file to save" >&2
          fi
